# Copy .env.example to .env and configure for local dev (run.ps1 loads it automatically)
spring.application.name=thadam
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=5000

spring.datasource.url=jdbc:postgresql://localhost:5432/thadam
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration

spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:5000/login/oauth2/code/google}

app.oauth2.frontend-redirect=${OAUTH2_FRONTEND_REDIRECT:http://localhost:3000/oauth2/redirect}

gemini.api-key=${GEMINI_API_KEY}
gemini.api-version=${GEMINI_API_VERSION:v1beta}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.displayRequestDuration=true

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
management.info.env.enabled=true
