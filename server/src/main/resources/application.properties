spring.application.name=thadam

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=5000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.locations=classpath:db/migration

spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:5000/login/oauth2/code/google}

app.oauth2.frontend-redirect=${OAUTH2_FRONTEND_REDIRECT:http://localhost:3000/oauth2/redirect}

# Actuator / Observability
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}